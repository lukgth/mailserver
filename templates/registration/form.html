<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create a Mailbox</title>
<style>
body { font-family: monospace; max-width: 600px; margin: 2em auto; padding: 0 1em; line-height: 1.6; }
h1 { font-size: 1.2em; border-bottom: 1px solid #ccc; padding-bottom: 0.5em; }
label { display: block; margin: 1em 0; }
input, select { font-family: monospace; font-size: 1em; padding: 0.3em; border: 1px solid #ccc; }
input[type="text"], input[type="password"] { width: 100%; box-sizing: border-box; }
button { font-family: monospace; font-size: 1em; padding: 0.4em 1.5em; cursor: pointer; }
.error { color: #c00; }
.success { color: #090; }
small { color: #666; }
hr { border: none; border-top: 1px solid #ccc; margin: 1.5em 0; }
pre { background: #f5f5f5; padding: 0.5em; overflow-x: auto; }
</style>
</head>
<body>
<h1>Create a Mailbox</h1>
{% if let Some(error) = error %}
<p class="error"><strong>!</strong> {{ error }}</p>
{% endif %}
<form method="post" action="/register">
  <label>
    Username<br>
    <div style="display:flex;gap:0">
      <input type="text" name="username" id="reg_username" value="{{ username }}" required
             placeholder="yourname" style="flex:1;border-right:none"
             pattern="[a-zA-Z0-9._-]+">
      <select name="domain" id="reg_domain" required style="border-left:1px solid #ccc">
        {% for d in domains %}
        <option value="{{ d.name }}"{% if d.name == selected_domain %} selected{% endif %}>@{{ d.name }}</option>
        {% endfor %}
      </select>
    </div>
    <small>email: <strong id="reg_preview">{{ username_preview }}</strong></small>
  </label>
  <label>
    Display Name<br>
    <input type="text" name="name" value="{{ name }}" placeholder="John Doe">
  </label>
  <label>
    Password<br>
    <input type="password" name="password" required minlength="8">
  </label>
  <label>
    Confirm Password<br>
    <input type="password" name="confirm_password" required minlength="8">
  </label>
  <label>
    Invite Code<br>
    <input type="text" name="invite_code" value="{{ invite_code }}" required
           placeholder="a1b2c3d4e5f6g7h8" autocomplete="off">
  </label>
  <button type="submit">Create Account</button>
</form>
<hr>
<p><small>mail server &mdash; <a href="/">admin</a></small></p>
<script>
(function() {
  var u = document.getElementById('reg_username');
  var p = document.getElementById('reg_preview');
  var d = document.getElementById('reg_domain');
  function update() { var x = u.value.trim() || ''; var y = d.value || ''; p.textContent = x ? x + '@' + y : '@' + y; }
  if (u) u.addEventListener('input', update);
  if (d) d.addEventListener('change', update);
})();
</script>
</body>
</html>
