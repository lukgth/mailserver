<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unsubscribe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
<h1>Unsubscribe</h1>
{% if success %}
  {% if requires_confirmation %}
  <p>{{ message }}</p>
  <form method="post" action="/unsubscribe?token={{ token }}">
    <button type="submit">Confirm Unsubscribe</button>
  </form>
  {% else %}
  <p><mark data-variant="success">{{ message }}</mark></p>
  {% endif %}
{% else %}
<p><mark data-variant="danger">{{ message }}</mark></p>
{% endif %}
</main>
<script>
(function(){
  var m = document.cookie.match(/csrf_token=([^;]+)/);
  if (!m) return;
  var token = m[1];
  document.querySelectorAll('form[method=post]').forEach(function(f){
    if (!f.querySelector('input[name=_csrf_token]')) {
      var h = document.createElement('input');
      h.type = 'hidden'; h.name = '_csrf_token'; h.value = token;
      f.appendChild(h);
    }
  });
})();
</script>
</body>
</html>
