# Rspamd quarantine module configuration
# Enables quarantine for emails exceeding the spam score threshold
quarantine {
  # Store quarantine data in Redis
  redis_key = "bloom_quarantine"
  messages_key = "quarantine_messages"
  # Maximum message size to quarantine (1MB)
  max_size = 1M
  # Maximum number of quarantined messages
  max_num_of_messages = 1000
  # Maximum age of quarantined messages (2 days)
  max_duration = 2d
  # Settings prefix for per-user quarantine settings
  settings_prefix = "QUARANTINE_"
  # Enable quarantine for all emails exceeding the threshold
  actions = ["reject", "add_header", "rewrite_subject"]
}
